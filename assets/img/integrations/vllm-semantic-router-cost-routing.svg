<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 560" font-family="Figtree, system-ui, -apple-system, Segoe UI, sans-serif" role="img" aria-labelledby="title description">
  <title id="title">Cost-based semantic routing with agentgateway and vLLM Semantic Router</title>
  <desc id="description">A coding agent sends model auto to agentgateway. Agentgateway asks vLLM Semantic Router to select a model, then routes the request to either GPT-5.4 nano for routine coding or GPT-5.5 for complex coding and records catalog-priced telemetry.</desc>
  <defs>
    <linearGradient id="gatewayGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#6D28D9"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Request, external processing, and backend routing flow. -->
  <g fill="none" stroke="#94A3B8" stroke-width="2">
    <line x1="212" y1="260" x2="278" y2="260" marker-end="url(#arrow)"/>
    <line x1="370" y1="180" x2="370" y2="132" marker-end="url(#arrow)"/>
    <line x1="410" y1="132" x2="410" y2="180" marker-end="url(#arrow)"/>
    <path d="M500,232 C600,232 635,206 738,206" marker-end="url(#arrow)"/>
    <path d="M500,288 C600,288 635,366 738,366" marker-end="url(#arrow)"/>
    <line x1="390" y1="340" x2="390" y2="419" marker-end="url(#arrow)"/>
  </g>

  <text x="350" y="155" text-anchor="end" font-size="11.5" fill="#64748B">request</text>
  <text x="430" y="155" font-size="11.5" fill="#64748B">model decision</text>

  <!-- Coding agent. -->
  <g filter="url(#softShadow)">
    <rect x="32" y="219" width="180" height="82" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <text x="122" y="252" text-anchor="middle" font-size="19" font-weight="700" fill="#0F172A">Coding agent</text>
  <text x="122" y="277" text-anchor="middle" font-size="13.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#7C3AED">model: auto</text>

  <!-- Gateway is the decision and accounting surface. -->
  <g filter="url(#softShadow)">
    <rect x="280" y="180" width="220" height="160" rx="16" fill="url(#gatewayGradient)"/>
  </g>
  <text x="390" y="226" text-anchor="middle" font-size="21" font-weight="800" fill="#FFFFFF">agentgateway</text>
  <text x="390" y="255" text-anchor="middle" font-size="13.5" fill="#FFFFFF" opacity="0.9">calls vSR before routing</text>
  <text x="390" y="280" text-anchor="middle" font-size="13.5" fill="#FFFFFF" opacity="0.9">forwards to the selected model</text>
  <text x="390" y="305" text-anchor="middle" font-size="11.5" fill="#FFFFFF" opacity="0.78" letter-spacing="0.25">records the routing outcome</text>
  <rect x="324" y="314" width="132" height="21" rx="10.5" fill="#FFFFFF" opacity="0.16"/>
  <text x="390" y="329" text-anchor="middle" font-size="11.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#FFFFFF">OpenAI-compatible</text>

  <!-- The external semantic decision. -->
  <g filter="url(#softShadow)">
    <rect x="305" y="50" width="170" height="82" rx="18" fill="#F5F3FF" stroke="#C4B5FD"/>
  </g>
  <text x="390" y="84" text-anchor="middle" font-size="15" font-weight="700" fill="#5B21B6">vSR semantic policy</text>
  <text x="390" y="107" text-anchor="middle" font-size="12.5" fill="#6D28D9">selects the model tier</text>

  <!-- Selected model tiers. -->
  <g filter="url(#softShadow)">
    <rect x="740" y="160" width="228" height="92" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <rect x="740" y="160" width="6" height="92" rx="3" fill="#0F766E"/>
  <text x="764" y="193" font-size="16" font-weight="700" fill="#0F172A">Routine coding</text>
  <text x="764" y="216" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#0F766E">gpt-5.4-nano</text>
  <text x="764" y="236" font-size="12.5" fill="#64748B">lower-cost model</text>

  <g filter="url(#softShadow)">
    <rect x="740" y="320" width="228" height="92" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
  </g>
  <rect x="740" y="320" width="6" height="92" rx="3" fill="#B45309"/>
  <text x="764" y="353" font-size="16" font-weight="700" fill="#0F172A">Complex coding</text>
  <text x="764" y="376" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#B45309">gpt-5.5</text>
  <text x="764" y="396" font-size="12.5" fill="#64748B">higher-capability model</text>

  <!-- Gateway telemetry. -->
  <g filter="url(#softShadow)">
    <rect x="244" y="420" width="292" height="92" rx="14" fill="#FFFFFF" stroke="#CCFBF1"/>
  </g>
  <rect x="244" y="420" width="6" height="92" rx="3" fill="#0F766E"/>
  <text x="268" y="453" font-size="16" font-weight="700" fill="#0F172A">Catalog-priced telemetry</text>
  <text x="268" y="476" font-size="12.5" fill="#0F766E">model selection, tokens, cost, latency</text>
  <text x="268" y="496" font-size="12.5" fill="#64748B">Prometheus, logs, traces, Grafana</text>
</svg>
