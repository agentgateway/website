<template data-ks-field-panel="ks-widget-1-node-5"><div class="ks-detail-card"><div class="ks-detail-path">spec.deployment.metadata</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-complex">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block"><code class="ks-inline-code">metadata</code> defines a subset of object metadata to be customized.<br /><code class="ks-inline-code">labels</code> and <code class="ks-inline-code">annotations</code> are merged with existing values. If both<br /><code class="ks-inline-code">GatewayClass</code> and <code class="ks-inline-code">Gateway</code> parameters define the same label or<br />annotation key, the <code class="ks-inline-code">Gateway</code> value takes precedence (applied second).</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (1)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-6"><div class="ks-detail-card"><div class="ks-detail-path">spec.deployment.metadata.annotations</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-object">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Annotations is an unstructured key value map stored with a resource that may be<br />set by external tools to store and retrieve arbitrary metadata. They are not<br />queryable and should be preserved when modifying objects.<br />More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (1)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-7"><div class="ks-detail-card"><div class="ks-detail-path">spec.deployment.metadata.labels</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-object">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Map of string keys and values that can be used to organize and categorize<br />(scope and select) objects. May match selectors of replication controllers<br />and services.<br />More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (1)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-8"><div class="ks-detail-card"><div class="ks-detail-path">spec.deployment.spec</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-object">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block"><code class="ks-inline-code">spec</code> provides an opaque mechanism to configure the resource spec.<br />This field accepts a complete or partial Kubernetes resource spec, such<br />as <code class="ks-inline-code">PodSpec</code> or <code class="ks-inline-code">ServiceSpec</code>, and will be merged with the generated<br />configuration using <strong class="ks-strong">Strategic Merge Patch</strong> semantics.</div><div class="ks-rich-heading ks-rich-h1">Application Order</div><div class="ks-rich-block">Overlays are applied after all typed configuration fields from both levels.<br />The full merge order is:</div><div class="ks-rich-block"> 1. <code class="ks-inline-code">GatewayClass</code> typed configuration fields<br /> 2. <code class="ks-inline-code">Gateway</code> typed configuration fields<br /> 3. <code class="ks-inline-code">GatewayClass</code> overlays<br /> 4. <code class="ks-inline-code">Gateway</code> overlays (can override all previous values)</div><div class="ks-rich-heading ks-rich-h1">Strategic Merge Patch &amp; Deletion Guide</div><div class="ks-rich-block">This merge strategy allows you to override individual fields, merge lists, or delete items<br />without needing to provide the entire resource definition.</div><div class="ks-rich-block"><strong class="ks-strong">1. Replacing Values (Scalars):</strong><br />Simple fields (strings, integers, booleans) in your config will overwrite the generated defaults.</div><div class="ks-rich-block"><strong class="ks-strong">2. Merging Lists (Append/Merge):</strong><br />Lists with &quot;merge keys&quot;, like <code class="ks-inline-code">containers</code> which merges on <code class="ks-inline-code">name</code>, or<br /><code class="ks-inline-code">tolerations</code> which merges on <code class="ks-inline-code">key</code>,<br />will append your items to the generated list, or update existing items if keys match.</div><div class="ks-rich-block"><strong class="ks-strong">3. Deleting Fields or List Items ($patch: delete):</strong><br />To remove a field or list item from the generated resource, use the<br /><code class="ks-inline-code">$patch: delete</code> directive. This works for both map fields and list items,<br />and is the recommended approach because it works with both client-side<br />and server-side apply.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      # Delete pod-level securityContext
      securityContext:
        $patch: delete
      # Delete nodeSelector
      nodeSelector:
        $patch: delete
      containers:
      # Be sure to use the correct proxy name here or you will add a
      # container instead of modifying a container.
      - name: proxy-name
        # Delete container-level securityContext
        securityContext:
          $patch: delete</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">4. Null Values (server-side apply only):</strong><br />Setting a field to <code class="ks-inline-code">null</code> can also remove it, but this ONLY works with<br /><code class="ks-inline-code">kubectl apply --server-side</code> or equivalent. With regular client-side<br /><code class="ks-inline-code">kubectl apply</code>, null values are stripped by kubectl before reaching<br />the API server, so the deletion won't occur. Prefer <code class="ks-inline-code">$patch: delete</code><br />for consistent behavior across both apply modes.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      nodeSelector: null  # Removes nodeSelector (server-side apply only!)</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">5. Replacing Maps Entirely ($patch: replace):</strong><br />To replace an entire map with your values (instead of merging), use <code class="ks-inline-code">$patch: replace</code>.<br />This removes all existing keys and replaces them with only your specified keys.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      nodeSelector:
        $patch: replace
        custom-key: custom-value</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">6. Replacing Lists Entirely ($patch: replace):</strong><br />If you want to strictly define a list and ignore all generated defaults, use <code class="ks-inline-code">$patch: replace</code>.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>service:
  spec:
    ports:
    - $patch: replace
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP</code></pre></div></div><details class="ks-validation"><summary class="ks-validation-summary">Validation</summary><div class="ks-validation-body"><div class="ks-validation-item"><span class="ks-validation-label">Preserve unknown fields</span><span class="ks-validation-value">true</span></div></div></details><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (2)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/customize/">setup/customize/customize</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-9"><div class="ks-detail-card"><div class="ks-detail-path">spec.env</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-complex">object[]</span></div><div class="ks-detail-desc"><div class="ks-rich-block">The container environment variables. These override any existing<br />values. If you want to delete an environment variable entirely, use<br /><code class="ks-inline-code">$patch: delete</code> with <code class="ks-inline-code">AgentgatewayParametersOverlays</code> instead. Note that<br />[variable<br />expansion](https://kubernetes.io/docs/tasks/inject-data-application/define-interdependent-environment-variables/)<br />does apply, but is highly discouraged -- to set dependent environment<br />variables, you can use <code class="ks-inline-code">$(VAR_NAME)</code>, but it's highly discouraged.<br /><code class="ks-inline-code">$$(VAR_NAME)</code> avoids expansion and results in a literal<br /><code class="ks-inline-code">$(VAR_NAME)</code>.</div><div class="ks-rich-block">If <code class="ks-inline-code">SESSION_KEY</code> is specified, it takes precedence over the<br />controller-managed per-<code class="ks-inline-code">Gateway</code> session key <code class="ks-inline-code">Secret</code>.</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (3)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../llm/guardrail-api/guardrails/">llm/guardrail-api/guardrails</a></div><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../llm/guardrails/webhook/guardrails/">llm/guardrails/webhook/guardrails</a></div><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-10"><div class="ks-detail-card"><div class="ks-detail-path">spec.env.name</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-string">string</span><span class="ks-detail-required">Required</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Name of the environment variable.<br />May consist of any printable ASCII characters except '='.</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (3)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../llm/guardrail-api/guardrails/">llm/guardrail-api/guardrails</a></div><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../llm/guardrails/webhook/guardrails/">llm/guardrails/webhook/guardrails</a></div><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-11"><div class="ks-detail-card"><div class="ks-detail-path">spec.env.value</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-string">string</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Variable references $(VAR_NAME) are expanded<br />using the previously defined environment variables in the container and<br />any service environment variables. If a variable cannot be resolved,<br />the reference in the input string will be unchanged. Double $$ are reduced<br />to a single $, which allows for escaping the $(VAR_NAME) syntax: i.e.<br />&quot;$$(VAR_NAME)&quot; will produce the string literal &quot;$(VAR_NAME)&quot;.<br />Escaped references will never be expanded, regardless of whether the variable<br />exists or not.<br />Defaults to &quot;&quot;.</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (3)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../llm/guardrail-api/guardrails/">llm/guardrail-api/guardrails</a></div><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../llm/guardrails/webhook/guardrails/">llm/guardrails/webhook/guardrails</a></div><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>

<template data-ks-field-panel="ks-widget-1-node-15"><div class="ks-detail-card"><div class="ks-detail-path">spec.env.valueFrom.configMapKeyRef.name</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-string">string</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Name of the referent.<br />This field is effectively required, but due to backwards compatibility is<br />allowed to be empty. Instances of this type with an empty value here are<br />almost certainly wrong.<br />More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names</div></div></div></template>

<template data-ks-field-panel="ks-widget-1-node-17"><div class="ks-detail-card"><div class="ks-detail-path">spec.env.valueFrom.fieldRef</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-complex">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Selects a field of the pod: supports metadata.name, metadata.namespace, <code class="ks-inline-code">metadata.labels['&lt;KEY&gt;']</code>, <code class="ks-inline-code">metadata.annotations['&lt;KEY&gt;']</code>,<br />spec.nodeName, spec.serviceAccountName, status.hostIP, status.podIP, status.podIPs.</div></div><details class="ks-validation"><summary class="ks-validation-summary">Validation</summary><div class="ks-validation-body"><div class="ks-validation-item"><span class="ks-validation-label">Map type</span><span class="ks-validation-value">atomic</span></div></div></details></div></template>

<template data-ks-field-panel="ks-widget-1-node-20"><div class="ks-detail-card"><div class="ks-detail-path">spec.env.valueFrom.fileKeyRef</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-complex">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block">FileKeyRef selects a key of the env file.<br />Requires the EnvFiles feature gate to be enabled.</div></div><details class="ks-validation"><summary class="ks-validation-summary">Validation</summary><div class="ks-validation-body"><div class="ks-validation-item"><span class="ks-validation-label">Map type</span><span class="ks-validation-value">atomic</span></div></div></details></div></template>

<template data-ks-field-panel="ks-widget-1-node-22"><div class="ks-detail-card"><div class="ks-detail-path">spec.env.valueFrom.fileKeyRef.optional</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-boolean">boolean</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Specify whether the file or its key must be defined. If the file or key<br />does not exist, then the env var is not published.<br />If optional is set to true and the specified key does not exist,<br />the environment variable will not be set in the Pod's containers.</div><div class="ks-rich-block">If optional is set to false and the specified key does not exist,<br />an error will be returned during Pod creation.</div></div><details class="ks-validation"><summary class="ks-validation-summary">Validation</summary><div class="ks-validation-body"><div class="ks-validation-item"><span class="ks-validation-label">Default</span><span class="ks-validation-value">false</span></div></div></details></div></template>

<template data-ks-field-panel="ks-widget-1-node-33"><div class="ks-detail-card"><div class="ks-detail-path">spec.horizontalPodAutoscaler</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-complex">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block"><code class="ks-inline-code">horizontalPodAutoscaler</code> allows creating a <code class="ks-inline-code">HorizontalPodAutoscaler</code><br />for the agentgateway proxy. If absent, no HPA is created. If present, an<br />HPA is created with its <code class="ks-inline-code">scaleTargetRef</code> automatically configured to<br />target the agentgateway proxy <code class="ks-inline-code">Deployment</code>. The <code class="ks-inline-code">metadata</code> and <code class="ks-inline-code">spec</code><br />fields from this overlay are applied to the generated HPA.</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (1)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-34"><div class="ks-detail-card"><div class="ks-detail-path">spec.horizontalPodAutoscaler.metadata</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-complex">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block"><code class="ks-inline-code">metadata</code> defines a subset of object metadata to be customized.<br /><code class="ks-inline-code">labels</code> and <code class="ks-inline-code">annotations</code> are merged with existing values. If both<br /><code class="ks-inline-code">GatewayClass</code> and <code class="ks-inline-code">Gateway</code> parameters define the same label or<br />annotation key, the <code class="ks-inline-code">Gateway</code> value takes precedence (applied second).</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (1)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-35"><div class="ks-detail-card"><div class="ks-detail-path">spec.horizontalPodAutoscaler.metadata.annotations</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-object">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Annotations is an unstructured key value map stored with a resource that may be<br />set by external tools to store and retrieve arbitrary metadata. They are not<br />queryable and should be preserved when modifying objects.<br />More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations</div></div></div></template>
<template data-ks-field-panel="ks-widget-1-node-36"><div class="ks-detail-card"><div class="ks-detail-path">spec.horizontalPodAutoscaler.metadata.labels</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-object">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Map of string keys and values that can be used to organize and categorize<br />(scope and select) objects. May match selectors of replication controllers<br />and services.<br />More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels</div></div><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (1)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-37"><div class="ks-detail-card"><div class="ks-detail-path">spec.horizontalPodAutoscaler.spec</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-object">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block"><code class="ks-inline-code">spec</code> provides an opaque mechanism to configure the resource spec.<br />This field accepts a complete or partial Kubernetes resource spec, such<br />as <code class="ks-inline-code">PodSpec</code> or <code class="ks-inline-code">ServiceSpec</code>, and will be merged with the generated<br />configuration using <strong class="ks-strong">Strategic Merge Patch</strong> semantics.</div><div class="ks-rich-heading ks-rich-h1">Application Order</div><div class="ks-rich-block">Overlays are applied after all typed configuration fields from both levels.<br />The full merge order is:</div><div class="ks-rich-block"> 1. <code class="ks-inline-code">GatewayClass</code> typed configuration fields<br /> 2. <code class="ks-inline-code">Gateway</code> typed configuration fields<br /> 3. <code class="ks-inline-code">GatewayClass</code> overlays<br /> 4. <code class="ks-inline-code">Gateway</code> overlays (can override all previous values)</div><div class="ks-rich-heading ks-rich-h1">Strategic Merge Patch &amp; Deletion Guide</div><div class="ks-rich-block">This merge strategy allows you to override individual fields, merge lists, or delete items<br />without needing to provide the entire resource definition.</div><div class="ks-rich-block"><strong class="ks-strong">1. Replacing Values (Scalars):</strong><br />Simple fields (strings, integers, booleans) in your config will overwrite the generated defaults.</div><div class="ks-rich-block"><strong class="ks-strong">2. Merging Lists (Append/Merge):</strong><br />Lists with &quot;merge keys&quot;, like <code class="ks-inline-code">containers</code> which merges on <code class="ks-inline-code">name</code>, or<br /><code class="ks-inline-code">tolerations</code> which merges on <code class="ks-inline-code">key</code>,<br />will append your items to the generated list, or update existing items if keys match.</div><div class="ks-rich-block"><strong class="ks-strong">3. Deleting Fields or List Items ($patch: delete):</strong><br />To remove a field or list item from the generated resource, use the<br /><code class="ks-inline-code">$patch: delete</code> directive. This works for both map fields and list items,<br />and is the recommended approach because it works with both client-side<br />and server-side apply.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      # Delete pod-level securityContext
      securityContext:
        $patch: delete
      # Delete nodeSelector
      nodeSelector:
        $patch: delete
      containers:
      # Be sure to use the correct proxy name here or you will add a
      # container instead of modifying a container.
      - name: proxy-name
        # Delete container-level securityContext
        securityContext:
          $patch: delete</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">4. Null Values (server-side apply only):</strong><br />Setting a field to <code class="ks-inline-code">null</code> can also remove it, but this ONLY works with<br /><code class="ks-inline-code">kubectl apply --server-side</code> or equivalent. With regular client-side<br /><code class="ks-inline-code">kubectl apply</code>, null values are stripped by kubectl before reaching<br />the API server, so the deletion won't occur. Prefer <code class="ks-inline-code">$patch: delete</code><br />for consistent behavior across both apply modes.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      nodeSelector: null  # Removes nodeSelector (server-side apply only!)</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">5. Replacing Maps Entirely ($patch: replace):</strong><br />To replace an entire map with your values (instead of merging), use <code class="ks-inline-code">$patch: replace</code>.<br />This removes all existing keys and replaces them with only your specified keys.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      nodeSelector:
        $patch: replace
        custom-key: custom-value</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">6. Replacing Lists Entirely ($patch: replace):</strong><br />If you want to strictly define a list and ignore all generated defaults, use <code class="ks-inline-code">$patch: replace</code>.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>service:
  spec:
    ports:
    - $patch: replace
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP</code></pre></div></div><details class="ks-validation"><summary class="ks-validation-summary">Validation</summary><div class="ks-validation-body"><div class="ks-validation-item"><span class="ks-validation-label">Preserve unknown fields</span><span class="ks-validation-value">true</span></div></div></details><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (1)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>

class="ks-inline-code">tolerations</code> which merges on <code class="ks-inline-code">key</code>,<br />will append your items to the generated list, or update existing items if keys match.</div><div class="ks-rich-block"><strong class="ks-strong">3. Deleting Fields or List Items ($patch: delete):</strong><br />To remove a field or list item from the generated resource, use the<br /><code class="ks-inline-code">$patch: delete</code> directive. This works for both map fields and list items,<br />and is the recommended approach because it works with both client-side<br />and server-side apply.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      # Delete pod-level securityContext
      securityContext:
        $patch: delete
      # Delete nodeSelector
      nodeSelector:
        $patch: delete
      containers:
      # Be sure to use the correct proxy name here or you will add a
      # container instead of modifying a container.
      - name: proxy-name
        # Delete container-level securityContext
        securityContext:
          $patch: delete</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">4. Null Values (server-side apply only):</strong><br />Setting a field to <code class="ks-inline-code">null</code> can also remove it, but this ONLY works with<br /><code class="ks-inline-code">kubectl apply --server-side</code> or equivalent. With regular client-side<br /><code class="ks-inline-code">kubectl apply</code>, null values are stripped by kubectl before reaching<br />the API server, so the deletion won't occur. Prefer <code class="ks-inline-code">$patch: delete</code><br />for consistent behavior across both apply modes.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      nodeSelector: null  # Removes nodeSelector (server-side apply only!)</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">5. Replacing Maps Entirely ($patch: replace):</strong><br />To replace an entire map with your values (instead of merging), use <code class="ks-inline-code">$patch: replace</code>.<br />This removes all existing keys and replaces them with only your specified keys.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>spec:
  template:
    spec:
      nodeSelector:
        $patch: replace
        custom-key: custom-value</code></pre></div><div class="ks-rich-block"><strong class="ks-strong">6. Replacing Lists Entirely ($patch: replace):</strong><br />If you want to strictly define a list and ignore all generated defaults, use <code class="ks-inline-code">$patch: replace</code>.</div><div class="ks-code-wrap"><pre class="ks-code-block"><code>service:
  spec:
    ports:
    - $patch: replace
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8443
      protocol: TCP</code></pre></div></div><details class="ks-validation"><summary class="ks-validation-summary">Validation</summary><div class="ks-validation-body"><div class="ks-validation-item"><span class="ks-validation-label">Preserve unknown fields</span><span class="ks-validation-value">true</span></div></div></details></div></template>
<template data-ks-field-panel="ks-widget-1-node-73"><div class="ks-detail-card"><div class="ks-detail-path">spec.shutdown</div><div class="ks-detail-meta-line"><span class="ks-detail-type ks-type-complex">object</span></div><div class="ks-detail-desc"><div class="ks-rich-block">Shutdown delay configuration. How graceful planned or unplanned data<br />plane changes happen is in tension with how quickly rollouts of the data<br />plane complete. How long a data plane pod must wait for shutdown to be<br />perfectly graceful depends on how you have configured your <code class="ks-inline-code">Gateway</code><br />resources.</div></div><details class="ks-validation"><summary class="ks-validation-summary">Validation</summary><div class="ks-validation-body"><div class="ks-validation-item"><span class="ks-validation-label">Rule</span><div class="ks-validation-value ks-validation-value-block">The 'min' value must be less than or equal to the 'max' value.</div></div></div></details><details class="ks-validation ks-documentation"><summary class="ks-validation-summary">Documentation References (1)</summary><div class="ks-validation-body"><div class="ks-doc-link-row"><a class="ks-doc-link" href="../../../setup/customize/configs/">setup/customize/configs</a></div></div></details></div></template>

    highlightTimer = window.setTimeout(clearHighlight, 1800);
    if (scroll) {
      node.scrollIntoView({ behavior: "smooth", block: "center" });
    }
    input.value = entry.path;
    hideResults();
    if (updateHash) {
      setHash(entry.path);
    }
  }

  function selectHashTarget() {
    const rawHash = window.location.hash.replace(/^#/, "");
    if (!rawHash) {
      if (entries.length > 0) {
        selectEntry(entries[0], { scroll: false });
      }
      return;
    }
    const entry = entryByPath.get(normalize(decodeURIComponent(rawHash)));
    if (entry) {
      selectEntry(entry);
      return;
    }
    if (entries.length > 0) {
      selectEntry(entries[0], { scroll: false });
    }
  }

  function toggleSubtree(control) {
    const row = control.closest(".ks-row");
    if (!row) {
      return;
    }
    const childContainers = Array.from(row.querySelectorAll("[data-ks-children-container]"));
    if (childContainers.length === 0) {
      return;
    }
    const shouldOpen = childContainers.some((candidate) => candidate.hasAttribute("hidden"));
    childContainers.forEach((candidate) => {
      candidate.hidden = !shouldOpen;
    });
  }

  input.addEventListener("input", renderMatches);
  input.addEventListener("focus", () => {
    if (input.value.trim()) {
      renderMatches();
    }
  });
  input.addEventListener("keydown", (event) => {
    if (results.hidden || matches.length === 0) {
      return;
    }
    if (event.key === "ArrowDown") {
      event.preventDefault();
      setActiveIndex((activeIndex + 1) % matches.length);
      return;
    }
    if (event.key === "ArrowUp") {
      event.preventDefault();
      setActiveIndex((activeIndex - 1 + matches.length) % matches.length);
      return;
    }
    if (event.key === "Enter" && activeIndex >= 0) {
      event.preventDefault();
      selectEntry(matches[activeIndex]);
      return;
    }
    if (event.key === "Escape") {
      hideResults();
    }
  });

  results.addEventListener("mousedown", (event) => {
    event.preventDefault();
  });
  results.addEventListener("click", (event) => {
    const target = event.target;
    const button = target instanceof Element ? target.closest("[data-node-id]") : null;
    if (!button) {
      return;
    }
    const entry = matches.find((candidate) => candidate.nodeId === button.getAttribute("data-node-id"));
    if (entry) {
      selectEntry(entry);
    }
  });

  document.addEventListener("click", (event) => {
    if (!host.contains(event.target)) {
      hideResults();
    }
  });
  typeButtons.forEach((typeButton) => {
    typeButton.addEventListener("click", (event) => {
      event.stopPropagation();
      if (event.ctrlKey || event.metaKey) {
        event.preventDefault();
        toggleSubtree(typeButton);
        return;
      }
      const children = childrenByID.get(typeButton.getAttribute("data-ks-children-target"));
      if (children) {
        children.hidden = !children.hidden;
      }
    });
  });
  root.addEventListener("click", (event) => {
    const target = event.target;
    if (target instanceof Element && target.closest("button")) {
      return;
    }
    const selectable = target instanceof Element ? target.closest(".ks-row-line") : null;
    if (!selectable || !root.contains(selectable)) {
      return;
    }
    const path = selectable.getAttribute("data-ks-path");
    if (!path) {
      return;
    }
    if (event.ctrlKey || event.metaKey) {
      return;
    }
    setHash(path);
    const entry = entryByPath.get(normalize(path));
    if (entry) {
      selectEntry(entry, { scroll: false });
    }
  });
  window.addEventListener("hashchange", selectHashTarget);
  selectHashTarget();
})();
</script>
