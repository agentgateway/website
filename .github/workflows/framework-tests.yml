# Hugo + Hextra docs-framework harness, run against agw-oss's built site.
#
# The harness lives in solo-io/docs-theme-extras and is checked out at the
# SHA pinned in go.mod (the module pseudo-version). Layouts and tests stay
# in lockstep — bumping the module pin is one PR that updates both.
#
# Marked continue-on-error for the first ~week to let allowlists and
# fixture-aware specs settle. Promote to a required check once the suite
# stays green for a sustained run.

name: Framework tests

on:
  pull_request:
    paths:
      - 'layouts/**'
      - 'assets/css/**'
      - 'assets/js/**'
      - 'go.mod'
      - 'go.sum'
      - 'hugo.yaml'
      - '.docs-test.toml'
      - '.github/workflows/framework-tests.yml'
  workflow_dispatch:

jobs:
  framework-test-static:
    name: Static checks
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache: false
      - uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.160.1'
          extended: true

      - name: Resolve docs-theme-extras SHA from go.mod
        id: theme-sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pseudo-version format: v0.0.0-YYYYMMDDhhmmss-<12-char-sha>.
          # The 14-digit date contains 12 leading digits that ALSO match
          # [0-9a-f]{12}, so the regex finds two matches per line and the
          # first is the date prefix, not the SHA. Take the LAST match.
          short=$(grep "docs-theme-extras" go.mod | grep -oE '[0-9a-f]{12}' | tail -1)
          if [ -z "$short" ]; then
            echo "Could not extract docs-theme-extras short SHA from go.mod" >&2
            exit 1
          fi
          # actions/checkout treats anything that isn't exactly 40 hex
          # chars as a branch/tag name, so the 12-char short SHA from the
          # pseudo-version fails to fetch. Resolve to the full 40-char
          # SHA via the commits API before passing to checkout.
          sha=$(gh api "repos/solo-io/docs-theme-extras/commits/${short}" --jq .sha)
          if [ -z "$sha" ]; then
            echo "Could not resolve full SHA for short=${short}" >&2
            exit 1
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Check out docs-theme-extras at module pin
        uses: actions/checkout@v6
        with:
          repository: solo-io/docs-theme-extras
          ref: ${{ steps.theme-sha.outputs.sha }}
          path: docs-theme-extras

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'docs-theme-extras/package-lock.json'

      - name: Build site with Hugo
        run: |
          # PostCSS is invoked by Hugo's css.PostCSS for assets/css/styles.css
          # but isn't installed by default in this runner. Mirror the
          # install pattern from links.yml so Hugo can find it via npx.
          npm i -D postcss postcss-cli autoprefixer
          hugo --gc --minify

      - name: Install harness dependencies
        working-directory: docs-theme-extras
        run: npm ci

      - name: Run static specs
        working-directory: docs-theme-extras
        env:
          DOCS_TEST_CONFIG: ${{ github.workspace }}/.docs-test.toml
        run: |
          npx playwright test --project=static --reporter=list,html 2>&1 | tee playwright-output.txt

      - name: Append summary to PR check
        if: always()
        working-directory: docs-theme-extras
        run: |
          {
            echo "## Framework tests — static (informational)"
            echo ""
            echo '```'
            tail -25 playwright-output.txt 2>/dev/null || echo "No test output captured."
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: framework-test-static-report
          path: docs-theme-extras/playwright-report
          retention-days: 7
