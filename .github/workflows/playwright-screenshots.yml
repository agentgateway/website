name: Playwright screenshots

on:
  schedule:
    # Nightly at 06:00 UTC: regenerate the product-UI screenshots and open a PR if they drift.
    - cron: '0 6 * * *'
  workflow_dispatch:

# Keep nightly and manual runs from overlapping.
concurrency:
  group: playwright-screenshots
  cancel-in-progress: false

# create-pull-request pushes a branch and opens a PR, so the token needs write on both.
# This also requires "Allow GitHub Actions to create and approve pull requests" in repo
# Settings -> Actions -> General (or a CREATE_PR_TOKEN/GH_TOKEN PAT).
permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Regenerate UI screenshots and open a PR
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout website repo
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'playwright/package-lock.json'

      - name: Install Playwright dependencies
        working-directory: playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      # Regenerate every baseline against the released UI image. Each mode brings up its own
      # backends + UI container (scripts/serve-*.sh) and tears them down, so they run
      # sequentially. Docker is preinstalled on the runner; baselines are Linux-rendered here,
      # which is the canonical environment (see playwright/README.md → Baselines and platforms).
      - name: Regenerate screenshot baselines
        working-directory: playwright
        env:
          CI: true
        run: npm run update:all

      - name: Sync screenshots into docs
        working-directory: playwright
        run: npm run sync-docs

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshot-report
          path: |
            playwright/playwright-report
            playwright/test-results
          retention-days: 7

      # Opens (or updates) a PR only when the regenerated baselines/images differ from main.
      # No diff -> no PR. Review the visual changes there before merging.
      - name: Open PR with refreshed screenshots
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: playwright/screenshot-refresh
          delete-branch: true
          add-paths: |
            assets/img
            playwright/__screenshots__
          commit-message: |
            docs: refresh product-UI screenshots

            Regenerated by the playwright-screenshots workflow against the released UI image.

            Signed-off-by: GitHub Action <action@github.com>
          committer: GitHub Action <action@github.com>
          title: '[Automated] Refresh product-UI screenshots'
          body: |
            Regenerated the agentgateway product-UI screenshots (Playwright baselines under
            `playwright/__screenshots__/` and the doc images under `assets/img/`).

            These come from `npm run update:all` + `npm run sync-docs` on Linux — the canonical
            capture environment. **Review the image diffs visually** before merging: a change
            here means the live UI no longer matches the committed screenshots.

            Workflow run: https://github.com/agentgateway/website/actions/runs/${{ github.run_id }}
          token: ${{ secrets.GH_TOKEN }}

      - name: Report PR result
        run: |
          if [ -n "${{ steps.create-pr.outputs.pull-request-url }}" ]; then
            echo "Screenshots changed — PR: ${{ steps.create-pr.outputs.pull-request-url }}"
          else
            echo "No screenshot changes — UI matches the committed images."
          fi
