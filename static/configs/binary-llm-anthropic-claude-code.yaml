# yaml-language-server: $schema=https://agentgateway.dev/schema/config
# Configuration for proxying Claude Code CLI traffic through agentgateway.
# Claude Code uses Anthropic's native /v1/messages endpoint.
# Set ANTHROPIC_BASE_URL="http://localhost:4000" to route Claude Code traffic here.

llm:
  models:
  - name: "*"
    provider: anthropic
    params:
      apiKey: "$ANTHROPIC_API_KEY"
