# OPTIONAL: bound the gRPC call to the ext-mcp policy server. Without a timeout
# the call has no deadline, so a slow or cold policy backend can hang the request
# instead of letting failureMode (FailClosed) engage.
#
# A backend policy targeting a Service only attaches once that Service is part of
# the dataplane config graph (i.e. referenced by a route). The HTTPRoute below
# makes the ext-mcp Service a backend so the timeout policy attaches
# (status Attached=True). Apply both together.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ext-mcp-route
  namespace: default
spec:
  parentRefs:
  - name: agentgateway-proxy
    namespace: agentgateway-system
  hostnames:
    - "ext-mcp.internal"
  rules:
    - backendRefs:
      - name: ext-mcp
        port: 4445
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: ext-mcp-timeout
  namespace: default
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: ext-mcp
  backend:
    http:
      requestTimeout: 5s
