# MCP guardrails (ExtMCP) policy. Routes selected JSON-RPC methods through the
# remote ext-mcp policy server:
#   * tools/call  runs in the Request phase  – the server can allow, mutate, or
#                 deny the call before it reaches the MCP target. Here it denies
#                 any tool whose name contains "forbidden".
#   * tools/list  runs in the Response phase – the server can rewrite the result
#                 returned to the client. Here it annotates each tool description.
#
# failureMode FailClosed (the default) means requests are denied if the policy
# server is unreachable or errors.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: mcp-guardrails
  namespace: default
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: mcp-backend
  backend:
    mcp:
      guardrails:
        processors:
        - remote:
            backendRef:
              name: ext-mcp
              port: 4445
            failureMode: FailClosed
          methods:
            tools/call: Request
            tools/list: Response
