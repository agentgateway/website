baseURL: "/"
enableRobotsTXT: true
canonifyURLs: true
title: "agentgateway | Agent Connectivity Solved"

outputs:
  home: [HTML, RSS, llms]
  page: [HTML, markdown]
  section: [HTML, RSS, markdown, llms]

defaultContentLanguage: en

module:
  imports:
    - path: github.com/imfing/hextra
  mounts:
    - source: "assets"
      target: "assets"
    - source: "fonts"
      target: "static/fonts"
    - source: "hugo_stats.json"
      target: "assets/watching/hugo_stats.json"

build:
  writeStats: true
  cachebusters:
    - source: "assets/watching/hugo_stats\\.json"
      target: "styles\\.css"
    - source: "(postcss|tailwind)\\.config\\.js"
      target: "css"
    - source: "assets/.*\\.(js|ts|jsx|tsx)"
      target: "js"
    - source: "assets/.*\\.(.*)$"
      target: "$1"

caches:
  getresource:
    dir: ":cacheDir/:project"
    maxAge: 1h  # Cache remote resources for 1 hour to balance freshness and build speed

markup:
  goldmark:
    extensions:
      extras:
        superscript:
          enable: true
    renderer:
      unsafe: true
  highlight:
    noClasses: false

enableInlineShortcodes: true

menu:
  main:
    - name: Home
      url: /
      weight: 1
    - name: Docs
      url: /docs
      weight: 2
    - name: Tutorials
      url: /tutorials
      weight: 3
    - name: Models
      weight: 5
      url: /models
    - name: Blog
      weight: 6
      url: /blog
    - name: Enterprise
      weight: 7
      url: /enterprise
    - name: Search
      weight: 8
      params:
        type: search
    - name: GitHub
      weight: 10
      url: "https://github.com/agentgateway/agentgateway"
      params:
        icon: github

params:
  title: agentgateway
  description: Agentgateway is an open source HTTP and gRPC proxy and gateway that unifies everyday API traffic with LLM, MCP, and A2A workloads in one data plane — connecting, securing, and observing agent-to-agent, agent-to-tool, and agent-to-LLM communication across any agent framework and environment.
  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: /logo.svg
      dark: /logo-dark.svg
      link: /
      width: 494
      height: 100
    width: wide
  images:
    - /ogimage.png

  page:
    width: wide

  theme:
    default: light
    displayToggle: true

  footer:
    enable: true
    displayCopyright: true
    displayPoweredBy: false
    width: wide

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  # Search
  # flexsearch is enabled by default
  search:
    enable: true
    type: flexsearch

    flexsearch:
      # index page by: content | summary | heading | title
      index: summary

  feedback:
    enable: true

  editURL:
    enable: false

  blog:
    list:
      displayTags: true

  comments:
    enable: false
    type: giscus

    giscus:
      repo: imfing/hextra
      repoId:
      category: General
      categoryId:

  searchbot:
    urls:
      websites: https://searchbot.tryhelix.ai/
      bots: https://searchbot.tryhelix.ai/bots

  # Section-specific configurations
  sections:
    standalone:
      versions:
        - version: "1.2.x"
          dropdown: "main"
          linkVersion: "main"
          url: "/main"
        - version: "1.1.x"
          dropdown: "1.1 (latest)"
          linkVersion: "latest"
          url: "/latest"
    kubernetes:
      versions:
        - version: "1.2.x"
          dropdown: "main"
          linkVersion: "main"
          url: "/main"
        - version: "1.1.x"
          dropdown: "1.1 (latest)"
          linkVersion: "latest"
          url: "/latest"

  gtmContainerID: "GTM-MDMTFJQC"
