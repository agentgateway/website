<style>
.hp-quotes {
  padding: 80px 0;
  background: var(--hp-bg-1);
  border-top: 1px solid var(--hp-border);
  border-bottom: 1px solid var(--hp-border);
}
.hp-quotes-inner {
  display: grid; grid-template-columns: auto 1fr; gap: 60px; align-items: center;
  max-width: 1200px; margin: 0 auto; padding: 0 24px;
}
@media (max-width: 820px) {
  .hp-quotes-inner { grid-template-columns: 1fr; gap: 32px; text-align: center; }
  .hp-quotes-left { align-items: center; }
}
.hp-quotes-left {
  display: flex; flex-direction: column; align-items: flex-start; gap: 20px;
}
.hp-quotes-logo { height: 64px; width: auto; }
@media (min-width: 1024px) { .hp-quotes-logo { height: 80px; } }
.hp-quotes-nav { display: flex; gap: 10px; }
.hp-quotes-nav button {
  width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center;
  border: 1px solid var(--hp-border-2); border-radius: 8px;
  background: transparent; color: var(--hp-text-3); cursor: pointer;
  transition: border-color 200ms, background 200ms, color 200ms;
}
.hp-quotes-nav button:hover {
  border-color: var(--hp-accent); color: var(--hp-accent); background: var(--hp-accent-soft);
}
.hp-quotes-carousel { position: relative; overflow: hidden; }
.hp-quotes-slide {
  transition: opacity 500ms ease;
}
.hp-quotes-slide[hidden] {
  display: none;
}
.hp-quotes-brand { height: 32px; width: auto; object-fit: contain; margin-bottom: 20px; }
@media (min-width: 768px) { .hp-quotes-brand { height: 40px; } }
.dark .hp-quotes-brand { filter: brightness(0) invert(1); }
.hp-quotes-text {
  font-family: var(--hp-font-b); font-size: 17px; line-height: 1.7;
  color: var(--hp-text-3); margin: 0 0 20px; font-style: italic;
}
@media (min-width: 768px) { .hp-quotes-text { font-size: 18px; } }
.hp-quotes-author {
  font-family: var(--hp-font-h); font-weight: 700; font-size: 15px;
  color: var(--hp-text-1);
}
.hp-quotes-title {
  font-family: var(--hp-font-b); font-size: 13px; color: var(--hp-text-4); margin-top: 2px;
}
.hp-quotes-dots {
  display: flex; gap: 6px; margin-top: 20px;
}
@media (max-width: 820px) { .hp-quotes-dots { justify-content: center; } }
.hp-quotes-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--hp-border-2);
  border: none; cursor: pointer; padding: 0; transition: background 200ms;
}
.hp-quotes-dot.active { background: var(--hp-accent); }
</style>

<div class="hp-quotes">
  <div class="hp-quotes-inner">
    <div class="hp-quotes-left">
      <img src="/lf-logo.svg" alt="agentgateway logo" class="hp-quotes-logo" loading="lazy">
      <div class="hp-quotes-nav">
        <button id="hpQuotesPrev" aria-label="Previous quote">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.78 4.22a.75.75 0 010 1.06L8.06 10l4.72 4.72a.75.75 0 11-1.06 1.06l-5.25-5.25a.75.75 0 010-1.06l5.25-5.25a.75.75 0 011.06 0z" clip-rule="evenodd"/></svg>
        </button>
        <button id="hpQuotesNext" aria-label="Next quote">
          <svg width="16" height="16" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M7.22 4.22a.75.75 0 011.06 0l5.25 5.25a.75.75 0 010 1.06l-5.25 5.25a.75.75 0 11-1.06-1.06L11.94 10 7.22 5.28a.75.75 0 010-1.06z" clip-rule="evenodd"/></svg>
        </button>
      </div>
    </div>
    <div>
      <div id="hpQuotesCarousel" class="hp-quotes-carousel">
        {{ $quotes := .Site.Data.quotes }}
        {{ if $quotes }}
          {{ range $i, $q := $quotes }}
            <div class="hp-quotes-slide" {{ if ne $i 0 }}hidden{{ end }} data-index="{{ $i }}">
              {{ with $q.logo }}
                <img src="{{ . }}" alt="" class="hp-quotes-brand" loading="lazy">
              {{ end }}
              <p class="hp-quotes-text">"{{ $q.quote }}"</p>
              <div class="hp-quotes-author">{{ $q.author }}</div>
              <div class="hp-quotes-title">{{ $q.title }}</div>
            </div>
          {{ end }}
        {{ end }}
      </div>
      <div class="hp-quotes-dots" id="hpQuotesDots">
        {{ if $quotes }}
          {{ range $i, $q := $quotes }}
            <button class="hp-quotes-dot {{ if eq $i 0 }}active{{ end }}" data-index="{{ $i }}" aria-label="Quote {{ add $i 1 }}"></button>
          {{ end }}
        {{ end }}
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  const carousel = document.getElementById('hpQuotesCarousel');
  if (!carousel) return;
  const slides = Array.from(carousel.querySelectorAll('.hp-quotes-slide'));
  const dots = Array.from(document.querySelectorAll('#hpQuotesDots .hp-quotes-dot'));
  const prevBtn = document.getElementById('hpQuotesPrev');
  const nextBtn = document.getElementById('hpQuotesNext');
  if (slides.length === 0) return;

  let current = 0;
  let timer = setInterval(next, 7000);

  function show(i) {
    slides.forEach((s, idx) => {
      if (idx === i) { s.hidden = false; } else { s.hidden = true; }
    });
    dots.forEach((d, idx) => {
      d.classList.toggle('active', idx === i);
    });
    current = i;
  }

  function next() { show((current + 1) % slides.length); }
  function prev() { show((current - 1 + slides.length) % slides.length); }

  function resetTimer() {
    clearInterval(timer);
    timer = setInterval(next, 7000);
  }

  if (prevBtn) prevBtn.addEventListener('click', () => { prev(); resetTimer(); });
  if (nextBtn) nextBtn.addEventListener('click', () => { next(); resetTimer(); });
  dots.forEach(d => {
    d.addEventListener('click', () => { show(parseInt(d.dataset.index)); resetTimer(); });
  });

  carousel.addEventListener('mouseenter', () => clearInterval(timer));
  carousel.addEventListener('mouseleave', () => { timer = setInterval(next, 7000); });
})();
</script>
