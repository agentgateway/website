# Conditional ext_proc: send LLM chat requests through a filtering processor,
# bypass everything else.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: conditional-extproc
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: my-route
  traffic:
    extProc:
      conditional:
      - condition: request.path.startsWith("/v1/chat")
        policy:
          backendRef:
            name: content-filter
            port: 9100
