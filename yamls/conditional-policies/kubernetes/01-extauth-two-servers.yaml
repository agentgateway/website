# Canonical example: pick one of two ext_authz services based on the request,
# with an unconditional fallback. First match wins.
#
# Requires agentgateway v1.2.0+ (PRs #1722, #1749).
# Prereqs: an HTTPRoute named `my-route` and Services `auth-strict` /
# `auth-standard` exist in the same namespace.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: conditional-extauth
  namespace: default
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: my-route
  traffic:
    extAuth:
      conditional:
      # Admin paths go to the strict authz server.
      - condition: request.path.startsWith("/admin")
        policy:
          backendRef:
            name: auth-strict
            port: 9000
          grpc: {}
          failureMode: FailClosed
      # Fallback: no condition => last, and only one unconditional entry allowed.
      - policy:
          backendRef:
            name: auth-standard
            port: 9000
          grpc: {}
          failureMode: FailClosed
