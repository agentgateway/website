# Conditional transformation: add a tracing header only on internal traffic.
# yaml-language-server: $schema=https://agentgateway.dev/schema/config

binds:
- port: 3000
  listeners:
  - routes:
    - backends:
      - host: localhost:8000
      policies:
        transformations:
          conditional:
          - condition: request.headers["x-internal"] == "true"
            request:
              add:
                x-trace-source: '"internal"'
          # No fallback entry: when no condition matches, no transformation runs.
