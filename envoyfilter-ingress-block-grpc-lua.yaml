# Corrected EnvoyFilter: block gRPC with 404 using Lua (valid for Istio/Envoy).
#
# Fixes vs original:
# 1. Use default_source_code.inline_string (inline_code is deprecated and may be removed).
# 2. Use filter name envoy.filters.http.lua (v3 extension name).
# 3. Use request_handle:log() with numeric level; logInfo() is not in the Envoy Lua API.
#
apiVersion: networking.istio.io/v1alpha3
kind: EnvoyFilter
metadata:
  name: ingress-block-grpc
  namespace: istio-system
spec:
  workloadSelector:
    labels:
      istio: ingressgateway
  configPatches:
    - applyTo: HTTP_FILTER
      match:
        context: GATEWAY
        listener:
          filterChain:
            filter:
              name: "envoy.filters.network.http_connection_manager"
              subFilter:
                name: "envoy.filters.http.router"
      patch:
        operation: INSERT_BEFORE
        value:
          name: envoy.filters.http.lua
          typed_config:
            "@type": "type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua"
            default_source_code:
              inline_string: |
                function envoy_on_request(request_handle)
                  local content_type = request_handle:headers():get("content-type")
                  if content_type and string.find(content_type, "application/grpc") then
                    request_handle:log(2, "Blocking gRPC request with 404")
                    request_handle:respond(
                      {
                        [":status"] = "404",
                        ["content-type"] = "text/plain",
                        ["access-control-allow-origin"] = "*"
                      },
                      "Not Found"
                    )
                  end
                end
